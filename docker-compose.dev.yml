version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: telemon_backend_dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=warning  # 로그 레벨 최소화
      - MOCK_AI=${MOCK_AI:-false}  # AI Mock 모드 지원
    command: >
      sh -c "
        pip install uv  # uv 설치
        && uv pip sync requirements.txt --system  # uv를 사용한 빠른 설치
        && python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
      "
    depends_on:
      - db
      - redis
      - loki
    networks:
      - telemon_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend_dev
    container_name: telemon_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_LOG_LEVEL=quiet  # 로그 레벨 최소화
    command: ["pnpm", "dev", "--turbo", "-- --quiet"]  # Next.js 로그 레벨 조정
    depends_on:
      - backend
    networks:
      - telemon_network

  db:
    image: postgres:15-alpine
    container_name: telemon_db_dev
    environment:
      POSTGRES_DB: telemon_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - telemon_network

  redis:
    image: redis:7-alpine
    container_name: telemon_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - telemon_network

  loki:
    image: grafana/loki:latest
    container_name: telemon_loki_dev
    ports:
      - "3100:3100"
    networks:
      - telemon_network

networks:
  telemon_network:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev: