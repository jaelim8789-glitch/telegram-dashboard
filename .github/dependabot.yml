version: 2
updates:
  # Frontend (this repo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@sentry/nextjs"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      capacitor:
        patterns:
          - "@capacitor/*"
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"

  # Backend
  - package-ecosystem: "pip"
    directory: "/telegram-dashboard-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
