name: Deploy TeleMon

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════
  # 1. Frontend — typecheck + build
  #    (this repo is the frontend only — backend lives in the separate
  #    telegram-dashboard-backend repo with its own workflow)
  # ═══════════════════════════════════════════
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci --prefer-offline
      - run: npx tsc --noEmit
        name: TypeScript type check

  # ═══════════════════════════════════════════
  # 2. Deploy (manual trigger or on master)
  # ═══════════════════════════════════════════
  deploy:
    needs: [frontend-ci]
    if: github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/telemon/telegram-dashboard
            git pull origin master
            cd /opt/telemon/backend
            docker compose build frontend
            docker compose up -d --no-deps frontend
            docker image prune -f
            echo "✅ 프론트엔드 배포 완료: $(cd /opt/telemon/telegram-dashboard && git log --oneline -1)"
