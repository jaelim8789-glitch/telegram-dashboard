name: Deploy TeleMon

on:
  push:
    branches: [master]
    paths-ignore: ['**.md', 'docs/**', 'DOCS/**']
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository_owner }}/telemon-frontend
  BACKEND_IMAGE: ${{ github.repository_owner }}/telemon-backend
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.telemon.online' }}

jobs:
  # ============================================
  # 1a. Frontend CI — typecheck + build + e2e
  # ============================================
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Cache node_modules (lockfile hash)
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}-${{ runner.os }}

      - if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline
        name: npm ci (miss)

      - run: npx tsc --noEmit
        name: TypeScript type check

      - run: npx next build
        name: Next.js production build

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ hashFiles('package-lock.json') }}-${{ runner.os }}

      - if: steps.cache-pw.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        name: Install Playwright chromium (miss)

      - run: >
          npx playwright test core-flows.spec.ts --project=chromium-no-auth
          --reporter=list 2>&1 | tail -50
        name: Run e2e smoke (core-flows)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  # ============================================
  # 1b. Frontend Docker build & push (GHCR)
  # ============================================
  frontend-docker:
    needs: [frontend-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' }}
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://telemon.online' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.telemon.online' }}
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'telemon_verify_bot' }}

  # ============================================
  # 2a. Deploy frontend to staging (master push)
  # ============================================
  deploy-frontend-staging:
    needs: [frontend-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging via SSH (pull-only)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull frontend -q
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --no-deps frontend

      - name: Smoke test (staging)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost:8080/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Notify staging deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [staging] Frontend deployed — ${{ github.sha }}","username":"TeleMon CI","icon_emoji":":rocket:"}
          preventFailureOnNoResponse: true

  # ============================================
  # 2b. Deploy frontend to production (manual)
  # ============================================
  deploy-frontend-production:
    needs: [frontend-docker]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy production via SSH (pull-only)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose pull frontend -q
            docker compose up -d --no-deps frontend

      - name: Smoke test (production)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Notify production deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [production] Frontend deployed","username":"TeleMon CI","icon_emoji":":rocket:"}
          preventFailureOnNoResponse: true

  # ============================================
  # 3a. Backend CI — pytest, coverage
  # ============================================
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-dashboard-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install uv
          uv pip install --system -r requirements-dev.txt
        name: Install Python deps (uv)

      - run: pytest tests/ -v --ignore=tests/test_alembic_downgrade.py -m "not slow" --junitxml=test-results/junit.xml --cov=app --cov-report=term --cov-report=xml:coverage.xml --cov-report=html:coverage_html
        name: Run pytest with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          ENVIRONMENT: development
          DEBUG: "true"
          ENCRYPTION_KEY: I62a0BiduGAdZjg9UH_vg3VuIEQMpe2AyDm2DfM2HlA=
          TELEGRAM_API_ID: "12345"
          TELEGRAM_API_HASH: test_hash_abcdef
          TELEGRAM_BOT_TOKEN: ""

      - name: Check coverage threshold (>= 70%)
        id: coverage-check
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' coverage.xml | tail -1)
          PCT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.1f")
          echo "pct=$PCT" >> $GITHUB_OUTPUT
          if (( $(echo "$PCT < 70" | bc -l) )); then exit 1; fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: telegram-dashboard-backend/test-results/
          retention-days: 14

  # ============================================
  # 3b. Backend Docker build & push (GHCR)
  # ============================================
  backend-docker:
    needs: [backend-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' }}
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: telegram-dashboard-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ============================================
  # 4a. Deploy backend to staging (master push)
  # ============================================
  deploy-backend-staging:
    needs: [backend-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy backend staging via SSH (pull-only)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull backend -q
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --no-deps backend

      - name: Smoke test (staging backend)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost:8000/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Notify staging deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [staging] Backend deployed","username":"TeleMon CI","icon_emoji":":robot:"}
          preventFailureOnNoResponse: true

  # ============================================
  # 4b. Deploy backend to production (manual)
  # ============================================
  deploy-backend-production:
    needs: [backend-docker]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy production via SSH (pull-only)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose pull backend -q
            docker compose up -d --no-deps backend

      - name: Smoke test (production)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost:8000/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Notify production deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [production] Backend deployed","username":"TeleMon CI","icon_emoji":":robot:"}
          preventFailureOnNoResponse: true
