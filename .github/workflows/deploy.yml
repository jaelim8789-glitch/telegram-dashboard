name: Deploy TeleMon

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOCKER_NETWORK: telemon_default
  BACKEND_DIR: telegram-dashboard-backend

jobs:
  # ═══════════════════════════════════════════
  # 1. Frontend — typecheck + lint + build
  # ═══════════════════════════════════════════
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci --prefer-offline
      - run: npx tsc --noEmit
        name: TypeScript type check
      - run: npm run lint -- --max-warnings 0
        name: ESLint

  # ═══════════════════════════════════════════
  # 2. Backend — import check + related tests
  # ═══════════════════════════════════════════
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-dashboard-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telegram_dashboard
          POSTGRES_PASSWORD: telegram_dashboard
          POSTGRES_DB: telegram_dashboard
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "**/requirements*.txt"

      - run: pip install -r requirements.txt
        name: Install Python deps

      - run: python -c "import sys; sys.path.insert(0, '.'); from app.main import app; print('import OK')"
        name: Import check

      - run: python -m pytest tests/ -q --tb=short -x --timeout=30 2>&1 | tail -30
        name: Run related tests
        env:
          DATABASE_URL: postgresql+asyncpg://telegram_dashboard:telegram_dashboard@localhost:5432/telegram_dashboard

  # ═══════════════════════════════════════════
  # 3. Deploy (manual trigger or on master)
  # ═══════════════════════════════════════════
  deploy:
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/telemon
            git pull origin master
            docker compose -f telegram-dashboard-backend/docker-compose.yml build backend
            docker compose -f telegram-dashboard-backend/docker-compose.yml up -d --no-deps backend
            docker image prune -f
            echo "✅ 배포 완료: $(git log --oneline -1)"
