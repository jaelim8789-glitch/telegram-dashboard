name: Deploy TeleMon

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
    paths-ignore: ['**.md', 'docs/**', 'DOCS/**', 'scripts/**', '.kilo/**']
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository_owner }}/telemon-frontend
  BACKEND_IMAGE: ${{ github.repository_owner }}/telemon-backend
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.telemon.online' }}
  NEXT_TELEMETRY_DISABLED: "1"
  PLAYWRIGHT_WORKERS: 2

jobs:
  # ============================================
  # 0. Lockfile integrity check
  # ============================================
  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: pnpm/action-setup@v4
        with: { version: 10.8.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --prefer-offline
        name: Verify lockfile matches package.json
      - run: pnpm ls --depth=0 2>&1 | head -5

  # ============================================
  # 1a. Frontend — typecheck
  # ============================================
  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: pnpm/action-setup@v4
        with: { version: 10.8.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Restore node_modules (cache hit = skip pnpm install)
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --prefer-offline
        name: pnpm install (on cache miss)

      - run: pnpm typecheck
        name: TypeScript type check
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}

  # ============================================
  # 1b. Frontend — build
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: pnpm/action-setup@v4
        with: { version: 10.8.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --prefer-offline
        name: pnpm install (on cache miss)

      - run: pnpm build
        name: Next.js production build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}

      - name: Cache .next build output
        uses: actions/cache@v4
        with:
          path: .next
          key: next-build-${{ github.sha }}-${{ runner.os }}
          restore-keys: |
            next-build-${{ runner.os }}-

  # ============================================
  # 1c. Frontend — e2e smoke test
  # ============================================
  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: pnpm/action-setup@v4
        with: { version: 10.8.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Restore node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --prefer-offline
        name: pnpm install (on cache miss)

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
          restore-keys: |
            pw-${{ runner.os }}-

      - if: steps.cache-pw.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        name: Install Playwright chromium (on cache miss)

      - run: >
          npx playwright test core-flows.spec.ts --project=chromium-no-auth
          --reporter=list 2>&1 | tail -50
        name: Run e2e smoke (core-flows)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  # ============================================
  # 1d. Frontend Docker build & push (GHCR)
  # ============================================
  frontend-docker:
    needs: [frontend-typecheck, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' }}
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image (BuildKit cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://telemon.online' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.telemon.online' }}
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'telemon_verify_bot' }}

  # ============================================
  # 2a. Deploy frontend staging (master push, pull-only)
  # ============================================
  deploy-frontend-staging:
    needs: [frontend-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Pull & zero-downtime deploy (staging)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull frontend -q
            bash scripts/zero-downtime-deploy.sh frontend docker-compose.yml http://localhost:8080/health staging

      - name: Health check (staging)
        id: smoke-frontend
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost:8080/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Rollback on health failure
        if: steps.smoke-frontend.outcome != 'success'
        uses: appleboy/ssh-action@v1.2.2
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/telemon/backend
            bash scripts/rollback-deploy.sh docker-compose.yml frontend

      - name: Notify staging deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [staging] Frontend deployed — ${{ github.sha }}","username":"TeleMon CI","icon_emoji":":rocket:"}
          preventFailureOnNoResponse: true

  # ============================================
  # 2b. Deploy frontend production (manual, pull-only)
  # ============================================
  deploy-frontend-production:
    needs: [frontend-docker]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Zero-downtime deploy (production)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose pull frontend -q
            bash scripts/zero-downtime-deploy.sh frontend docker-compose.yml http://localhost/health staging

      - name: Health check (production)
        id: smoke-frontend-prod
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Rollback on health failure
        if: steps.smoke-frontend-prod.outcome != 'success'
        uses: appleboy/ssh-action@v1.2.2
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/telemon/backend
            bash scripts/rollback-deploy.sh docker-compose.yml frontend

      - name: Notify production deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [production] Frontend deployed — ${{ github.sha }}","username":"TeleMon CI","icon_emoji":":rocket:"}
          preventFailureOnNoResponse: true

  # ============================================
  # 3a. Backend CI — pytest + coverage (uv pip → uvx)
  # ============================================
  backend-ci:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip backend]') }}
    defaults:
      run:
        working-directory: telegram-dashboard-backend
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Install uv (fast Python package manager)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "telegram-dashboard-backend/requirements-dev.txt"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv pip install --system -r requirements-dev.txt
        name: Install Python deps (uv pip)

      - run: uv run pytest tests/ -n auto -v --ignore=tests/test_alembic_downgrade.py -m "not slow" --junitxml=test-results/junit.xml --cov=app --cov-report=term --cov-report=xml:coverage.xml --cov-report=html:coverage_html
        name: Run pytest with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ENVIRONMENT: development
          DEBUG: "true"
          ENCRYPTION_KEY: I62a0BiduGAdZjg9UH_vg3VuIEQMpe2AyDm2DfM2HlA=
          TELEGRAM_API_ID: "12345"
          TELEGRAM_API_HASH: test_hash_abcdef
          TELEGRAM_BOT_TOKEN: ""

      - name: Check coverage threshold (>= 70%)
        id: coverage-check
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' coverage.xml | tail -1)
          PCT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.1f")
          echo "pct=$PCT" >> $GITHUB_OUTPUT
          if (( $(echo "$PCT < 70" | bc -l) )); then exit 1; fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: telegram-dashboard-backend/test-results/
          retention-days: 14

  # ============================================
  # 3b. Backend Docker build & push (GHCR, BuildKit cache)
  # ============================================
  backend-docker:
    needs: [backend-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/master' && github.event_name != 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' }}
            type=sha,prefix=,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image (BuildKit cache)
        uses: docker/build-push-action@v6
        with:
          context: telegram-dashboard-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ============================================
  # 4a. Deploy backend staging (pull-only + zero-downtime)
  # ============================================
  deploy-backend-staging:
    needs: [backend-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Pull & zero-downtime deploy backend (staging)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull backend -q
            bash scripts/zero-downtime-deploy.sh backend docker-compose.yml http://localhost:8000/health staging

      - name: Health check (staging backend)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost:8000/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Rollback on health failure (backend)
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/telemon/backend
            bash scripts/rollback-deploy.sh docker-compose.yml backend

      - name: Notify staging deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [staging] Backend deployed — ${{ github.sha }}","username":"TeleMon CI","icon_emoji":":robot:"}
          preventFailureOnNoResponse: true

  # ============================================
  # 4b. Deploy backend production (manual, pull-only)
  # ============================================
  deploy-backend-production:
    needs: [backend-docker]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Zero-downtime deploy backend (production)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/telemon/backend
            docker compose pull backend -q
            bash scripts/zero-downtime-deploy.sh backend docker-compose.yml http://localhost:8000/health staging

      - name: Health check (production backend)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost:8000/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Rollback on health failure (backend)
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/telemon/backend
            bash scripts/rollback-deploy.sh docker-compose.yml backend

      - name: Notify production deploy result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"${{ job.status == 'success' && '✅' || '❌' }} [production] Backend deployed — ${{ github.sha }}","username":"TeleMon CI","icon_emoji":":robot:"}
          preventFailureOnNoResponse: true
