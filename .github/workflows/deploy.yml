name: Frontend CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.8.1 }
      - uses: actions/setup-node@v3
        with: { node-version: 20, cache: "pnpm" }
      - run: pnpm install --no-frozen-lockfile --prefer-offline --ignore-scripts
      - run: pnpm approve-builds
      - run: pnpm build
      - run: ls -la .next/standalone/package.json 2>/dev/null && echo "? standalone output OK" || { echo "? .next/standalone not found"; exit 1; }

  frontend-docker:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image (BuildKit cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://telemon.online' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.telemon.online' }}
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME || 'telemon_verify_bot' }}

  deploy-frontend-production:
    if: ${{ always() && github.ref == 'refs/heads/master' }}
    needs: [frontend-docker]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pre-deploy gateway health check
        id: gateway-precheck
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 6); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "Gateway healthy"
                exit 0
              fi
              sleep 3
            done
            echo "Gateway unhealthy, aborting deploy"
            exit 1

      - name: Pull image + restart frontend
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            docker pull ghcr.io/jaelim8789-glitch/telemon-frontend:latest
            docker stop frontend && docker rm frontend
            docker run -d --name frontend --restart unless-stopped -p 3000:3000 ghcr.io/jaelim8789-glitch/telemon-frontend:latest
            docker restart nginx

      - name: Health check (production)
        id: smoke-frontend-prod
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set +e
            for i in $(seq 1 12); do
              curl -sf http://localhost/health > /dev/null 2>&1 && { echo "ok"; exit 0; }
              sleep 5
            done
            echo "smoke fail"; exit 1

      - name: Rollback on health failure
        if: steps.smoke-frontend-prod.outcome != 'success'
        uses: appleboy/ssh-action@v1.2.2
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            docker pull ghcr.io/jaelim8789-glitch/telemon-frontend:latest
            docker stop frontend && docker rm frontend
            docker run -d --name frontend --restart unless-stopped -p 3000:3000 ghcr.io/jaelim8789-glitch/telemon-frontend:latest
            docker restart nginx
