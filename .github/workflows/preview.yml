name: Preview Deploy (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to preview"
        required: true
        default: "master"

env:
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.telemon.online' }}

jobs:
  preview-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci --prefer-offline

      - run: npx tsc --noEmit
        name: Type check

      - run: npx next build
        name: Preview build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}

      - run: npx playwright install chromium --with-deps
        name: Install Playwright

      - run: npx playwright test core-flows.spec.ts --project=chromium-no-auth --reporter=list 2>&1 | tail -50
        name: e2e core-flows
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'http://localhost:3000' }}

  preview-deploy:
    needs: [preview-ci]
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Deploy preview to VPS
        id: deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            PR_NUM=${{ github.event.pull_request.number || github.ref_name }}
            BRANCH=${{ github.event.pull_request.head.ref || inputs.branch }}
            SAFE_NAME=$(echo "$BRANCH" | tr '/' '_' | tr '[:upper:]' '[:lower:]')
            PREVIEW_DIR="/opt/telemon/previews/${SAFE_NAME}"

            # Clone or pull preview branch
            if [ -d "$PREVIEW_DIR" ]; then
              cd "$PREVIEW_DIR"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
              git pull origin "$BRANCH"
            else
              git clone --branch "$BRANCH" --depth 1 \
                "https://github.com/${{ github.repository }}.git" "$PREVIEW_DIR"
            fi

            # Build preview docker stack with unique ports
            cd "$PREVIEW_DIR"
            docker compose -f docker-compose.yml build frontend
            PREVIEW_PORT=$((3000 + PR_NUM % 100))
            docker compose -f docker-compose.yml run -d \
              -p ${PREVIEW_PORT}:3000 \
              --name "preview-${SAFE_NAME}" \
              frontend

            echo "url=http://${VPS_HOST}:${PREVIEW_PORT}" >> "$GITHUB_OUTPUT"
            echo "✅ Preview deployed: branch=$BRANCH port=$PREVIEW_PORT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed!\n\n**URL:** ${url}\n\nBranch: \`${{ github.head_ref }}\`\nCommit: \`${{ github.sha }}\``
            });
