name: Local CI (act)
on: [push]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.8.1 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --prefer-offline --no-optional
      - run: pnpm build
      - run: npx tsc --noEmit
