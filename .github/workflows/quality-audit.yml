name: Quality Audit (Weekly)

on:
  schedule:
    - cron: "0 21 * * 0" # 매주 일요일 21:00 UTC = 월요일 06:00 KST
  workflow_dispatch:

jobs:
  quality-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # ── 1. jscpd: 중복 코드 감지 ──
      - run: npx jscpd src/ --min-lines 10 --min-tokens 50 --pattern "src/**/*.{ts,tsx}" --output report/jscpd --formatters json,html
        name: jscpd — duplicate code detection
        continue-on-error: true

      - run: |
          if [ -f report/jscpd/jscpd-report.json ]; then
            echo "### jscpd report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat report/jscpd/jscpd-report.json | python3 -m json.tool 2>/dev/null | head -40 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
        name: jscpd — report to step summary

      # ── 2. knip: 사용 안 하는 export/파일 감지 ──
      - run: npx knip --exclude-dirs node_modules,.next --production --reporter json > report/knip.json 2>&1 || true
        name: knip — dead code detection
        continue-on-error: true

      - run: |
          if [ -f report/knip.json ]; then
            echo "### knip report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat report/knip.json | python3 -m json.tool 2>/dev/null | head -80 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
        name: knip — report to step summary

      # ── 3. TS strict violation report ──
      - run: node scripts/ts-strict-report.js --html
        name: ts-strict-report
        continue-on-error: true

      - run: |
          if [ -f report/ts-strict-report.html ]; then
            echo "### TS Strict Report" >> $GITHUB_STEP_SUMMARY
            cat report/ts-strict-report.json | python3 -c "
import json,sys
r=json.load(sys.stdin)
print(f'**Total errors:** {r[\"totalErrors\"]}')
print(f'**Affected files:** {r[\"uniqueFiles\"]}')
print(f'**Error code types:** {r[\"uniqueCodes\"]}')
print()
print('| File | Count | Codes |')
print('|---|---|---|')
for f in r['topFiles'][:10]:
    print(f'| {f[\"file\"]} | {f[\"count\"]} | {\", \".join(f[\"codes\"][:3])} |')
" >> $GITHUB_STEP_SUMMARY
          fi
        name: ts-strict — summary to step summary

      # ── 4. Upload reports as artifacts ──
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: report/
          retention-days: 30

      # ── 5. Notify webhook ──
      - name: Notify quality report
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"📊 Weekly quality audit complete\nArtifacts: quality-reports","username":"TeleMon CI","icon_emoji":":bar_chart:"}
          preventFailureOnNoResponse: true
