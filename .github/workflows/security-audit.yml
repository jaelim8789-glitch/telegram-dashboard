name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1" # 매주 월요일 06:00 UTC
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-dashboard-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pip-audit safety
        name: Install security scanners

      - run: pip-audit --requirement requirements.txt --desc --severity critical,high
        name: pip-audit (critical + high only)
        continue-on-error: true

      - run: safety check --full-report -r requirements.txt
        name: safety check
        continue-on-error: true

      - name: Notify security report
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"🔒 Weekly security audit complete\nSee actions log for details","username":"TeleMon CI","icon_emoji":":shield:"}
          preventFailureOnNoResponse: true

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci --prefer-offline

      - run: npm audit --audit-level=high
        name: npm audit (high + critical)
        continue-on-error: true

      - name: Notify npm audit result
        if: always()
        uses: fjogeleit/http-request-action@v1
        continue-on-error: true
        with:
          url: ${{ secrets.ALERT_WEBHOOK_URL }}
          method: POST
          data: >-
            {"text":"🔒 Weekly npm audit complete","username":"TeleMon CI","icon_emoji":":shield:"}
          preventFailureOnNoResponse: true
