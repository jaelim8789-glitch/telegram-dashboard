name: "Setup Frontend CI"
description: "Checkout, setup Node/pnpm, cache pnpm store + Playwright browsers, install deps"
inputs:
  NEXT_PUBLIC_API_BASE_URL:
    description: "API base URL for build"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - uses: pnpm/action-setup@v4
      with:
        version: 10.8.1

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: "pnpm"

    - name: Cache pnpm store
      id: cache-store
      uses: actions/cache@v4
      with:
        path: ~/.local/share/pnpm/store
        key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - if: steps.cache-store.outputs.cache-hit != 'true'
      run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
      name: pnpm install (miss)

    - name: Cache Playwright browsers
      id: cache-pw
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
        restore-keys: |
          pw-${{ runner.os }}-

    - if: steps.cache-pw.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
      shell: bash
      name: Install Playwright chromium (miss)
