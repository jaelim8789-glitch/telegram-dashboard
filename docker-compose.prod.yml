version: '3.8'

services:
  watchtower:
    image: containrrr/watchtower
    container_name: telemon_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Poll for new images every 6h (21600s) instead of every 30s
    command: --interval 21600 --cleanup --include-restarting
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - telemon_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: telemon_backend_prod
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - loki
    networks:
      - telemon_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: telemon_frontend_prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - telemon_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:15-alpine
    container_name: telemon_db_prod
    environment:
      POSTGRES_DB: telemon_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - telemon_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  redis:
    image: redis:7-alpine
    container_name: telemon_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    restart: unless-stopped
    networks:
      - telemon_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  loki:
    image: grafana/loki:latest
    container_name: telemon_loki_prod
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - telemon_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  telemon_network:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod: