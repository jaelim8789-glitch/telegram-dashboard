# ─── TeleMon Production Nginx Configuration ──────────────────────────────────
#
# Domain mapping:
#   telemon.online     → public marketing website (landing page at /)
#   app.telemon.online → authenticated application   (dashboard at /app/)
#   api.telemon.online → FastAPI backend
#
# Single Next.js server at localhost:3000 serves both marketing and application
# content. Nginx routes by Host header, NOT by path — this allows the same Next.js
# build to serve the correct root content for each domain.
#
# Build the Next.js Docker image with:
#   docker build \
#     --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.telemon.online \
#     --build-arg NEXT_PUBLIC_SITE_URL=https://telemon.online \
#     --build-arg NEXT_PUBLIC_APP_URL=https://app.telemon.online \
#     -t telemon-frontend .
#
# Run:
#   docker run -d -p 3000:3000 telemon-frontend
#
# ─── CORS ─────────────────────────────────────────────────────────────────────
# CORS is handled by the FastAPI backend (separate repo), not by nginx.
# The backend's CORS middleware must allow:
#   https://app.telemon.online   (application dashboard)
#   https://telemon.online       (public signup/payment API calls)
# Backend CORS_ORIGINS should be: https://app.telemon.online,https://telemon.online
# DO NOT use wildcard origins in production.

upstream nextjs {
    server localhost:3000;
}

upstream fastapi {
    server localhost:8000;
}

# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name telemon.online app.telemon.online api.telemon.online;
    return 301 https://$host$request_uri;
}

# ─── api.telemon.online — FastAPI Backend ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.telemon.online;

    ssl_certificate     /etc/ssl/certs/telemon.online.pem;
    ssl_certificate_key /etc/ssl/private/telemon.online.key;

    # All /api/* and /docs /openapi.json routes
    location / {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─── app.telemon.online — Authenticated Application ──────────────────────────
server {
    listen 443 ssl http2;
    server_name app.telemon.online;

    ssl_certificate     /etc/ssl/certs/app.telemon.online.pem;
    ssl_certificate_key /etc/ssl/private/app.telemon.online.key;

    # API calls from the dashboard — proxy to backend
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Application frontend — Next.js handles /app/*, /admin/*, etc.
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js requires upgrading to WebSocket for HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─── telemon.online — Public Marketing Website ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name telemon.online;

    ssl_certificate     /etc/ssl/certs/telemon.online.pem;
    ssl_certificate_key /etc/ssl/private/telemon.online.key;

    # API calls from public pages (signup, API key payment, etc.)
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Public marketing frontend — Next.js serves landing page at / and public pages
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
