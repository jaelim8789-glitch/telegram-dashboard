# TeleMon Tempo Configuration
# Accepts OpenTelemetry traces via OTLP HTTP and gRPC.

server:
  http_listen_port: 3200
  grpc_listen_port: 9097
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s
  retry_after: 5s

compactor:
  compaction:
    block_retention: 720h  # 30 days

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
    block:
      bloom_filter_false_positive: 0.05
      v2_in_buffer_bytes: 10485760  # 10MB
      v2_prefetch_traces_count: 1000

overrides:
  max_bytes_per_trace: 5000000  # 5MB
  ingestion_rate_limit_bytes: 15000000  # 15MB/s
  ingestion_burst_size_bytes: 30000000  # 30MB