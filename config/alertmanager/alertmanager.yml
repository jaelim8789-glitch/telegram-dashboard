# TeleMon AlertManager Configuration
# Routes alerts to Slack/Discord/Telegram webhook and email.

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"
  # discord_webhook_url: "${DISCORD_WEBHOOK_URL}"

route:
  receiver: "default"
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: "critical"
      match:
        severity: "critical"
      repeat_interval: 30m
    - receiver: "warning"
      match:
        severity: "warning"
      repeat_interval: 2h
    - receiver: "default"
      match:
        severity: "info"

receivers:
  - name: "default"
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true
    slack_configs:
      - channel: "#telemon-alerts"
        title: '{{ template "telemon.title" . }}'
        text: '{{ template "telemon.text" . }}'
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true
    slack_configs:
      - channel: "#telemon-critical"
        title: '[CRITICAL] {{ template "telemon.title" . }}'
        text: '{{ template "telemon.text" . }}'
        send_resolved: true

  - name: "warning"
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true
    slack_configs:
      - channel: "#telemon-alerts"
        title: '[WARNING] {{ template "telemon.title" . }}'
        text: '{{ template "telemon.text" . }}'
        send_resolved: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"