# TeleMon Prometheus Configuration
# Scrapes TeleMon backend, Node Exporter, and itself.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "telemon"
    environment: "${ENVIRONMENT:-production}"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "alerts.yml"

scrape_configs:
  # TeleMon backend metrics
  - job_name: "telemon-backend"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:8000"  # Backend on host
        labels:
          service: "telemon-backend"
      - targets:
          - "telemon-backend:8000"       # Backend in Docker
        labels:
          service: "telemon-backend"

  # Node exporter (host metrics)
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "node-exporter:9100"
        labels:
          service: "host-metrics"

  # Prometheus itself
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "localhost:9090"