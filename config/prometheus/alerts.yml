# TeleMon Alert Rules
groups:
  - name: telemon-backend
    interval: 30s
    rules:
      # ── Availability ──────────────────────────────────────────
      - alert: BackendDown
        expr: up{job="telemon-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TeleMon backend is down"
          description: "Backend has been unreachable for more than 1 minute."

      # ── Runtime Health ────────────────────────────────────────
      - alert: NoActiveRuntimes
        expr: telemon_runtimes_active == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No active Telegram runtimes"
          description: "All Telegram accounts are disconnected. Check session status."

      - alert: HighRuntimeErrors
        expr: rate(telemon_runtimes_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High runtime error rate"
          description: "Runtime errors are occurring at {{ $value }}/sec over 5 minutes."

      # ── HTTP Performance ──────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(telemon_http_requests_errors_total[5m]) / rate(telemon_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate ({{ $value | humanizePercentage }})"
          description: "Error rate exceeds 5% over 5 minutes."

      - alert: HighLatency
        expr: rate(telemon_http_request_duration_seconds_sum[5m]) / rate(telemon_http_request_duration_seconds_count[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency ({{ $value }}s avg)"
          description: "Average request latency exceeds 5 seconds over 5 minutes."

      # ── Rate Limiting ─────────────────────────────────────────
      - alert: ExcessiveRateLimiting
        expr: rate(telemon_rate_limits_hit_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Excessive rate limiting ({{ $value }}/sec)"
          description: "Rate limit hits are very high. Consider reducing send frequency."

      # ── Healing Engine ────────────────────────────────────────
      - alert: HealingEngineFailures
        expr: rate(telemon_healing_actions_total[5m]) - rate(telemon_healing_actions_success_total[5m]) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Healing engine failures increasing"
          description: "Healing actions are failing at {{ $value }}/sec."

      # ── Database ──────────────────────────────────────────────
      - alert: HighDBErrorRate
        expr: rate(telemon_db_queries_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High database error rate"
          description: "Database errors are occurring at {{ $value }}/sec."

      - alert: SlowDBQueries
        expr: rate(telemon_db_query_duration_seconds_sum[5m]) / rate(telemon_db_query_duration_seconds_count[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries ({{ $value }}s avg)"
          description: "Average query latency exceeds 1 second."

      # ── Host Metrics ──────────────────────────────────────────
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage ({{ $value }}%)"
          description: "CPU usage exceeds 80% for more than 10 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage ({{ $value }}%)"
          description: "Memory usage exceeds 85% for more than 10 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space ({{ $value }}% available)"
          description: "Less than 10% disk space remaining on root partition."