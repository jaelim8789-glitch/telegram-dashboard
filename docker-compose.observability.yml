version: "3.8"

# TeleMon Observability Stack
# ============================
#   Prometheus  — metrics collection
#   Grafana     — visualization dashboard
#   Loki        — log aggregation (replace ELK for simplicity)
#   Tempo       — distributed tracing (OpenTelemetry backend)
#   AlertManager — alert routing (Slack/Discord/PagerDuty)
#   Node Exporter — host-level metrics (CPU, memory, disk)

networks:
  telemon-observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

services:
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: telemon-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - telemon-observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 3

  grafana:
    image: grafana/grafana:11.2.0
    container_name: telemon-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - telemon-observability
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:3.1.0
    container_name: telemon-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - telemon-observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  tempo:
    image: grafana/tempo:v2.5.0
    container_name: telemon-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "127.0.0.1:3200:3200"   # tempo query
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:4317:4317"   # OTLP gRPC
    networks:
      - telemon-observability
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: telemon-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - telemon-observability
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: telemon-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - telemon-observability
    restart: unless-stopped