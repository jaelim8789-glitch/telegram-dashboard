worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # Brotli (uncomment if brotli module is available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types
    #     text/plain
    #     text/css
    #     application/json
    #     application/javascript
    #     text/xml
    #     application/xml
    #     application/xml+rss
    #     text/javascript;

    # DNS prefetch and preconnect
    add_header Link "<https://api.telemon.online>; rel=preconnect; crossorigin" always;

    # Upstream: FastAPI backend
    upstream backend {
        server 127.0.0.1:8000;
        keepalive 64;
    }

    # API proxy
    server {
        listen 80;
        server_name api.telemon.online;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # No cache for API
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # Frontend app
    server {
        listen 80;
        server_name app.telemon.online;

        root /opt/telemon/frontend;

        # Static assets with immutable cache
        location /_next/static/ {
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        location /icons/ {
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        # HTML — short TTL
        location / {
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
            try_files $uri $uri.html $uri/index.html /index.html;
        }
    }
}
