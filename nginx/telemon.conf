# TeleMon nginx — 미니앱 라우트 포함
upstream telemon_frontend { server 127.0.0.1:3000; }
upstream telemon_backend { server 127.0.0.1:8000; }

# Gzip
gzip on;
gzip_types text/plain text/css application/json application/javascript image/svg+xml;
gzip_min_length 1000;
gzip_vary on;

# Brotli (module available)
# brotli on;
# brotli_types text/plain text/css application/json application/javascript image/svg+xml;

server {
    listen 80;
    server_name app.telemon.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.telemon.online;

    # SSL (fill with actual paths)
    ssl_certificate /etc/ssl/telemon/fullchain.pem;
    ssl_certificate_key /etc/ssl/telemon/privkey.pem;

    # DNS prefetch + preconnect
    add_header Link "<https://api.telemon.online>; rel=preconnect; crossorigin" always;

    # 정적 자산 장기 캐시
    location /_next/static/ {
        alias /opt/telemon/dashboard/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location /static/ {
        alias /opt/telemon/dashboard/public/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # 미니앱 라우트 — 반드시 API보다 먼저 와야 함
    location /miniapp {
        proxy_pass http://telemon_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js 메인
    location / {
        proxy_pass http://telemon_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.telemon.online;

    ssl_certificate /etc/ssl/telemon/fullchain.pem;
    ssl_certificate_key /etc/ssl/telemon/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://telemon_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forward_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://telemon_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /health {
        access_log off;
        proxy_pass http://telemon_backend;
    }
}
