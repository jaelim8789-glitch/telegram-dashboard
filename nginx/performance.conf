# Nginx performance tuning — include from main nginx.conf
# Place in /etc/nginx/performance.conf or include per-server block

worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_buffer_size 128k;
    client_max_body_size 10m;
}
